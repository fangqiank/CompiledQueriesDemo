<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#3B82F6"/>
    </marker>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5"/>
      <stop offset="100%" style="stop-color:#A7F3D0"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE"/>
      <stop offset="100%" style="stop-color:#DDD6FE"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FED7AA"/>
      <stop offset="100%" style="stop-color:#FDBA74"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3F4F6"/>
      <stop offset="100%" style="stop-color:#E5E7EB"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CCFBF1"/>
      <stop offset="100%" style="stop-color:#99F6E4"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E3A5F">CompiledQueriesDemo Architecture</text>
  <text x="480" y="50" text-anchor="middle" font-size="12" fill="#6B7280">EF Core Compiled Queries Benchmark (.NET 10 + PostgreSQL 16)</text>

  <!-- ========== Entry Point ========== -->
  <rect x="335" y="68" width="290" height="50" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Program.cs</text>
  <text x="480" y="106" text-anchor="middle" font-size="10" fill="#3B82F6">Entry Point + Quick Validation + BenchmarkRunner</text>

  <!-- Arrow: Program -> BenchmarkRunner -->
  <line x1="480" y1="118" x2="480" y2="148" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="138" font-size="9" fill="#6B7280">BenchmarkRunner.Run</text>

  <!-- ========== Benchmark Layer ========== -->
  <rect x="100" y="152" width="760" height="200" rx="10" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="115" y="170" font-size="11" font-weight="600" fill="#7C3AED">BenchmarkDotNet Layer (MemoryDiagnoser + RankColumn + P95)</text>

  <rect x="120" y="178" width="720" height="55" rx="8" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">QueryBenchmarks.cs</text>
  <text x="480" y="220" text-anchor="middle" font-size="10" fill="#7C3AED">4 Groups x 2 Methods = 8 Benchmarks (WarmupCount=10, IterationCount=50)</text>

  <!-- 4 benchmark group boxes -->
  <rect x="125" y="248" width="165" height="90" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="207" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">By ID (Tracking)</text>
  <text x="207" y="282" text-anchor="middle" font-size="9" fill="#8B5CF6">Normal vs Compiled</text>
  <text x="207" y="296" text-anchor="middle" font-size="8" fill="#A78BFA">532 vs 492 us</text>
  <text x="207" y="310" text-anchor="middle" font-size="8" fill="#A78BFA">40.5 vs 35.2 KB</text>
  <text x="207" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">7.5% faster</text>

  <rect x="305" y="248" width="165" height="90" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="387" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">By ID (NoTracking)</text>
  <text x="387" y="282" text-anchor="middle" font-size="9" fill="#8B5CF6">Normal vs Compiled</text>
  <text x="387" y="296" text-anchor="middle" font-size="8" fill="#A78BFA">523 vs 497 us</text>
  <text x="387" y="310" text-anchor="middle" font-size="8" fill="#A78BFA">40.5 vs 34.2 KB</text>
  <text x="387" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">5% faster</text>

  <rect x="485" y="248" width="165" height="90" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="567" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">By Name+Age (Track)</text>
  <text x="567" y="282" text-anchor="middle" font-size="9" fill="#8B5CF6">Normal vs Compiled</text>
  <text x="567" y="296" text-anchor="middle" font-size="8" fill="#A78BFA">537 vs 515 us</text>
  <text x="567" y="310" text-anchor="middle" font-size="8" fill="#A78BFA">41.6 vs 35.5 KB</text>
  <text x="567" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">4% faster</text>

  <rect x="665" y="248" width="165" height="90" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="747" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">By Name+Age (NoTrk)</text>
  <text x="747" y="282" text-anchor="middle" font-size="9" fill="#8B5CF6">Normal vs Compiled</text>
  <text x="747" y="296" text-anchor="middle" font-size="8" fill="#A78BFA">541 vs 535 us</text>
  <text x="747" y="310" text-anchor="middle" font-size="8" fill="#A78BFA">41.9 vs 34.5 KB</text>
  <text x="747" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#D97706">1% faster</text>

  <!-- Arrows from QueryBenchmarks to detail boxes -->
  <line x1="207" y1="233" x2="207" y2="246" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="387" y1="233" x2="387" y2="246" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="567" y1="233" x2="567" y2="246" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="747" y1="233" x2="747" y2="246" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ========== Shared SeedData ========== -->
  <rect x="100" y="370" width="210" height="55" rx="8" fill="url(#tealGrad)" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#0F766E">SeedData.cs</text>
  <text x="205" y="410" text-anchor="middle" font-size="10" fill="#0D9488">Constants + EnsureSeeded() + 4 Compiled Queries</text>

  <!-- Arrow: Benchmark -> SeedData -->
  <line x1="300" y1="340" x2="250" y2="368" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="356" font-size="9" fill="#14B8A6">compiled queries</text>

  <!-- ========== Data Access Layer ========== -->
  <rect x="360" y="370" width="240" height="55" rx="8" fill="url(#greenGrad)" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#065F46">AppDbContext.cs</text>
  <text x="480" y="410" text-anchor="middle" font-size="10" fill="#059669">DbContext | Table: customers | Index: (Name, Age)</text>

  <!-- Arrow: Benchmark -> DbContext -->
  <line x1="480" y1="352" x2="480" y2="368" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: DbContext -> Model -->
  <line x1="400" y1="425" x2="260" y2="460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="440" font-size="9" fill="#6B7280">DbSet&lt;Customer&gt;</text>

  <!-- Arrow: DbContext -> PostgreSQL -->
  <line x1="560" y1="425" x2="660" y2="460" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="630" y="440" font-size="9" fill="#3B82F6">Npgsql</text>

  <!-- ========== Model ========== -->
  <rect x="120" y="465" width="210" height="55" rx="8" fill="url(#grayGrad)" stroke="#6B7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="225" y="487" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Customer.cs</text>
  <text x="225" y="505" text-anchor="middle" font-size="10" fill="#6B7280">Id (PK) | Name (max 100) | Age</text>

  <!-- ========== Infrastructure ========== -->
  <rect x="530" y="465" width="340" height="80" rx="10" fill="none" stroke="#F97316" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="545" y="483" font-size="11" font-weight="600" fill="#EA580C">Infrastructure</text>

  <rect x="545" y="490" width="145" height="45" rx="6" fill="url(#orangeGrad)" stroke="#F97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="617" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">PostgreSQL 16</text>
  <text x="617" y="523" text-anchor="middle" font-size="9" fill="#C2410C">Docker Compose</text>

  <rect x="705" y="490" width="145" height="45" rx="6" fill="url(#orangeGrad)" stroke="#F97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="777" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">docker-compose.yml</text>
  <text x="777" y="523" text-anchor="middle" font-size="9" fill="#C2410C">Port 5433:5432</text>

  <!-- Connection between PG and docker-compose -->
  <line x1="690" y1="512" x2="703" y2="512" stroke="#F97316" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ========== Data Flow Legend ========== -->
  <rect x="120" y="570" width="720" height="65" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="140" y="590" font-size="11" font-weight="600" fill="#374151">Data Flow:</text>
  <text x="140" y="607" font-size="10" fill="#6B7280">1. Program.cs seeds 10,000 Customer records via SeedData.EnsureSeeded()</text>
  <text x="140" y="624" font-size="10" fill="#6B7280">2. QueryBenchmarks runs 8 benchmarks (4 Normal vs 4 Compiled, Tracking + NoTracking)</text>
  <text x="660" y="607" font-size="10" fill="#6B7280">3. Results exported as CSV/HTML</text>

  <!-- EF.CompileQuery callout -->
  <rect x="15" y="68" width="195" height="90" rx="8" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1"/>
  <text x="112" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">EF.CompileQuery</text>
  <text x="112" y="102" text-anchor="middle" font-size="9" fill="#3B82F6">Pre-compiles LINQ expression</text>
  <text x="112" y="116" text-anchor="middle" font-size="9" fill="#3B82F6">tree into cached delegate,</text>
  <text x="112" y="130" text-anchor="middle" font-size="9" fill="#3B82F6">skipping per-call parsing</text>
  <text x="112" y="148" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">13-18% less memory allocated</text>
  <line x1="210" y1="113" x2="330" y2="200" stroke="#60A5FA" stroke-width="1" stroke-dasharray="4,2"/>
</svg>